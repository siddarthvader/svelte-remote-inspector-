<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Remote Function Inspector</title>
    <style>
      body { font-family: sans-serif; margin: 12px; width: 420px; }
      button { margin-right: 8px; }
      pre {
        white-space: pre-wrap;
        word-break: break-word;
        border: 1px solid #ddd;
        padding: 8px;
        border-radius: 6px;
        max-height: 360px;
        overflow: auto;
      }
    </style>
  </head>
  <body>
    <h3>Remote Function Inspector</h3>
    <div>
      <button id="refresh">Refresh</button>
      <button id="clear">Clear</button>
    </div>
    <p id="meta"></p>
    <pre id="logs"></pre>
    <script src="popup.js"></script>
  </body>
</html>
